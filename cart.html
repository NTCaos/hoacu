<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtDoor - Giỏ Hàng Của Bạn</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-default navbar-fixed-top" style="background-color: #fff; border-bottom: 2px solid #f7a4b0;">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="index.html" style="color: #f7a4b0; font-weight: bold; font-size: 24px;">ARTDOOR</a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="index.html">TRANG CHỦ</a></li>
                    <li><a href="cart.html"><span class="glyphicon glyphicon-shopping-cart"></span> GIỎ HÀNG (<span id="cart-badge">0</span>)</a></li>
                    <li><a href="checkout.html"><span class="glyphicon glyphicon-list-alt"></span> THEO DÕI ĐƠN HÀNG</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 40px; margin-bottom: 60px;">
        <h2 class="text-center" style="color: #f7a4b0; margin-bottom: 30px; font-weight: bold;">GIỎ HÀNG CỦA BẠN</h2>
        
        <div class="row">
            <div class="col-md-8">
                <div class="table-responsive">
                    <table class="table table-bordered" id="cart-table">
                        <thead>
                            <tr>
                                <th width="15%">Hình ảnh</th>
                                <th>Tên sản phẩm</th>
                                <th width="15%">Đơn giá</th>
                                <th width="15%">Số lượng</th>
                                <th width="15%">Thành tiền</th>
                                <th width="10%">Xóa</th>
                            </tr>
                        </thead>
                        <tbody id="cart-table-body">
                            </tbody>
                    </table>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="panel panel-default">
                    <div class="panel-heading"><strong>TỔNG QUAN ĐƠN HÀNG</strong></div>
                    <div class="panel-body">
                        <p style="font-size: 16px;">Tổng cộng tiền: <strong id="cart-total" class="text-danger" style="font-size: 20px;">0đ</strong></p>
                        <hr>
                        <a href="index.html" class="btn class-default btn-block" style="border: 1px solid #ddd; margin-bottom: 10px;">TIẾP TỤC MUA SẮM</a>
                        <a href="checkout.html" id="btn-go-checkout" class="btn btn-danger btn-block btn-lg">TIẾN HÀNH THANH TOÁN</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>

    <script>
        $(document).ready(function() {
            renderCartTable();
        });

        // Hàm render danh sách sản phẩm trong giỏ hàng
        function renderCartTable() {
            var cart = JSON.parse(localStorage.getItem('ARTDOOR_CART')) || [];
            var html = "";
            var total = 0;

            if (cart.length === 0) {
                html = '<tr><td colspan="6" class="text-muted text-center" style="padding: 30px 0;">Giỏ hàng của bạn đang trống rỗng!</td></tr>';
                $('#btn-go-checkout').addClass('disabled').attr('href', '#');
            } else {
                $('#btn-go-checkout').removeClass('disabled').attr('href', 'checkout.html');
                cart.forEach(function(item, index) {
                    var itemTotal = item.price * item.quantity;
                    total += itemTotal;

                    html += '<tr>' +
                                '<td><img src="' + item.img + '" class="img-responsive" style="max-height: 50px; margin: 0 auto; border-radius:4px;"></td>' +
                                '<td style="text-align: left; font-weight: bold;">' + item.name + '</td>' +
                                '<td>' + item.price.toLocaleString('vi-VN') + 'đ</td>' +
                                '<td><input type="number" class="form-control text-center" value="' + item.quantity + '" min="1" onchange="changeQty(' + index + ', this.value)" style="width: 65px; margin: 0 auto; padding:4px;"></td>' +
                                '<td style="color: #d9534f; font-weight: bold;">' + itemTotal.toLocaleString('vi-VN') + 'đ</td>' +
                                '<td><button class="btn btn-link text-danger" onclick="deleteItem(' + index + ')"><span class="glyphicon glyphicon-trash"></span></button></td>' +
                            '</tr>';
                });
            }
            $('#cart-table-body').html(html);
            $('#cart-total').text(total.toLocaleString('vi-VN') + 'đ');
        }

        // Hàm thay đổi số lượng trực tiếp trong bảng
        function changeQty(index, newQty) {
            var cart = JSON.parse(localStorage.getItem('ARTDOOR_CART')) || [];
            newQty = parseInt(newQty);
            if (newQty < 1 || isNaN(newQty)) newQty = 1;
            
            cart[index].quantity = newQty;
            localStorage.setItem('ARTDOOR_CART', JSON.stringify(cart));
            renderCartTable();
            if(typeof updateCartBadge === 'function') updateCartBadge();
        }

        // Hàm xóa sản phẩm ra khỏi giỏ
        function deleteItem(index) {
            var cart = JSON.parse(localStorage.getItem('ARTDOOR_CART')) || [];
            cart.splice(index, 1);
            localStorage.setItem('ARTDOOR_CART', JSON.stringify(cart));
            renderCartTable();
            if(typeof updateCartBadge === 'function') updateCartBadge();
        }
    </script>
</body>
</html>
