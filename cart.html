<div class="container" style="margin-top: 40px; margin-bottom: 60px;">
    <h2>GIỎ HÀNG CỦA BẠN</h2>
    <div class="row">
        <div class="col-md-9">
            <table class="table table-bordered" id="cart-table">
                <thead>
                    <tr style="background-color: #f7a4b0; color: white;">
                        <th>Hình ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th>Giá tiền</th>
                        <th>Số lượng</th>
                        <th>Tổng tiền</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="cart-items-container">
                    </tbody>
            </table>
        </div>
        <div class="col-md-3">
            <div class="panel panel-default">
                <div class="panel-heading"><strong>ĐƠN HÀNG</strong></div>
                <div class="panel-body">
                    <h4>Tổng cộng: <span id="cart-total-price" style="color: #d9534f; font-weight: bold;">0đ</span></h4>
                    <hr>
                    <a href="checkout.html" class="btn btn-danger btn-block" id="btn-checkout">TIẾN HÀNH THANH TOÁN</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    renderCartPage();
});

function renderCartPage() {
    var cart = JSON.parse(localStorage.getItem('ARTDOOR_CART')) || [];
    var html = "";
    var totalCartMoney = 0;

    if (cart.length === 0) {
        html = '<tr><td colspan="6" class="text-center" style="padding: 30px;">Giỏ hàng của bạn đang trống! <a href="category-co.html">Mua sắm ngay</a></td></tr>';
        $('#btn-checkout').addClass('disabled').attr('href', '#');
    } else {
        cart.forEach(function(item, index) {
            var itemTotal = item.price * item.quantity;
            totalCartMoney += itemTotal;
            html += '<tr>' +
                        '<td class="text-center"><img src="'+item.img+'" style="width: 50px; height: 50px; object-fit: cover;"></td>' +
                        '<td><strong>'+item.name+'</strong></td>' +
                        '<td>'+item.price.toLocaleString('vi-VN')+'đ</td>' +
                        '<td>'+item.quantity+'</td>' +
                        '<td>'+itemTotal.toLocaleString('vi-VN')+'đ</td>' +
                        '<td><button class="btn btn-warning btn-xs" onclick="removeFromCart('+index+')">Xóa</button></td>' +
                    '</tr>';
        });
    }
    $('#cart-items-container').html(html);
    $('#cart-total-price').text(totalCartMoney.toLocaleString('vi-VN') + 'đ');
}

function removeFromCart(index) {
    var cart = JSON.parse(localStorage.getItem('ARTDOOR_CART')) || [];
    cart.splice(index, 1);
    localStorage.setItem('ARTDOOR_CART', JSON.stringify(cart));
    renderCartPage();
    if(typeof updateCartBadge === 'function') updateCartBadge();
}
</script>
