<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Mục Màu Vẽ - ArtDoor</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="padding-top: 70px;" id="page-identifier" data-page="mau">

    <nav class="navbar navbar-default navbar-fixed-top">
        <div class="container">
            <div class="navbar-header"><a class="navbar-brand" href="index.html">ARTDOOR</a></div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="index.html">TRANG CHỦ</a></li>
                    <li><a href="#" onclick="alert('Giỏ hàng hiện tại có ' + cartCount + ' sản phẩm!')"><span class="glyphicon glyphicon-shopping-cart"></span> GIỎ HÀNG (<span id="cart-badge">0</span>)</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 20px;">
        <ol class="breadcrumb">
            <li><a href="index.html">Trang chủ</a></li>
            <li class="active">Màu Vẽ</li>
        </ol>

        <div class="row">
            <div class="col-sm-3">
                <div class="well">
                    <h4><strong>LOẠI MÀU</strong></h4>
                    <div class="checkbox"><label><input type="checkbox" class="filter-checkbox" value="mau-nuoc" checked> Màu Nước</label></div>
                    <div class="checkbox"><label><input type="checkbox" class="filter-checkbox" value="mau-acrylic" checked> Màu Acrylic / Sơn Dầu</label></div>
                    <div class="checkbox"><label><input type="checkbox" class="filter-checkbox" value="mau-poster" checked> Màu Poster / Gouache</label></div>
                    <div class="checkbox"><label><input type="checkbox" class="filter-checkbox" value="mau-chi" checked> Màu Chì / Phấn</label></div>
                </div>
            </div>

            <div class="col-sm-9">
                <h2 style="margin-top: 0; font-weight: bold; color: #333;">MÀU VẼ CHUYÊN NGHIỆP</h2>
                <p class="text-muted">
                    Hiển thị <span id="total-products">0</span> sản phẩm | Sắp xếp: 
                    <a href="#" class="sort-link" data-sort="new" style="font-weight: bold; margin-right: 5px;">Hàng mới</a> | 
                    <a href="#" class="sort-link" data-sort="asc" style="margin-right: 5px;">Giá tăng dần</a> | 
                    <a href="#" class="sort-link" data-sort="desc">Giá giảm dần</a>
                </p>
                <hr>
                <div class="row" id="product-container"></div>
            </div>
        </div>
    </div>

    <footer class="text-center" style="background-color: #2d2d30; color: #f5f5f5; padding: 20px; margin-top: 60px;"><p>Bản quyền thuộc về © 2026 <strong>ArtDoor Hoacu</strong></p></footer>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
