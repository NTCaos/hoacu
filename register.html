<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Thành Viên - ArtDoor</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .register-container {
            max-width: 500px;
            margin: 100px auto 50px auto;
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .form-group .text-danger { font-size: 13px; margin-top: 5px; display: block; }
    </style>
</head>
<body style="background-color: #f6f6f6;">

    <nav class="navbar navbar-default navbar-fixed-top">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="index.html">ARTDOOR</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="register-container">
            <h2 class="text-center" style="color: #e65100; margin-bottom: 25px;">ĐĂNG KÝ THÀNH VIÊN</h2>
            <form id="registerForm">
                
                <div class="form-group">
                    <label for="regUser">Tên đăng nhập (Tài khoản):</label>
                    <input type="text" class="form-control" id="regUser" placeholder="Nhập tên tài khoản từ 5 ký tự">
                    <span class="text-danger" id="errRegUser"></span>
                </div>

                <div class="form-group">
                    <label for="regEmail">Địa chỉ Email:</label>
                    <input type="text" class="form-control" id="regEmail" placeholder="example@gmail.com">
                    <span class="text-danger" id="errRegEmail"></span>
                </div>

                <div class="form-group">
                    <label for="regPass">Mật khẩu:</label>
                    <input type="password" class="form-control" id="regPass" placeholder="Tối thiểu 6 ký tự">
                    <span class="text-danger" id="errRegPass"></span>
                </div>

                <div class="form-group">
                    <label for="regConfirmPass">Xác nhận mật khẩu:</label>
                    <input type="password" class="form-control" id="regConfirmPass" placeholder="Nhập lại mật khẩu phía trên">
                    <span class="text-danger" id="errRegConfirmPass"></span>
                </div>

                <div class="checkbox">
                    <label><input type="checkbox" id="regTerm"> Tôi đồng ý với các điều khoản của ArtDoor</label>
                    <span class="text-danger" id="errRegTerm"></span>
                </div>

                <button type="submit" class="btn btn-danger btn-block btn-lg" style="background-color: #e65100;">ĐĂNG KÝ NGAY</button>
                
                <div class="text-center" style="margin-top: 15px;">
                    <a href="index.html" style="color: #e65100;">Quay lại Trang Chủ</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
