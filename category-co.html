<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Mục Cọ Vẽ - ArtDoor</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="padding-top: 70px;">

    <nav class="navbar navbar-default navbar-fixed-top">
        <div class="container">
            <div class="navbar-header">
                <a class="navbar-brand" href="index.html">ARTDOOR</a>
            </div>
            <div class="collapse navbar-collapse">
                <ul class="nav navbar-nav navbar-right">
                    <li><a href="index.html">TRANG CHỦ</a></li>
                    <li><a href="#" onclick="alert('Giỏ hàng hiện tại có ' + cartCount + ' sản phẩm!')">
                        <span class="glyphicon glyphicon-shopping-cart"></span> GIỎ HÀNG (<span id="cart-badge">0</span>)
                    </a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 20px;">
        <ol class="breadcrumb">
            <li><a href="index.html">Trang chủ</a></li>
            <li class="active">CỌ VẼ</li>
        </ol>

        <div class="row">
            <div class="col-sm-3">
                <div class="well">
                    <h4><strong>LOẠI</strong></h4>
                    <div class="checkbox"><label><input type="checkbox" checked> Cọ Vẽ</label></div>
                    <div class="checkbox"><label><input type="checkbox"> Phụ Kiện Cọ</label></div>
                </div>
            </div>

            <div class="col-sm-9">
                <h2 style="margin-top: 0;">CỌ VẼ</h2>
                <p class="text-muted">Sắp xếp: <a href="#">Tên A → Z</a> | <a href="#">Giá tăng dần</a> | <a href="#">Hàng mới</a></p>
                <hr>

                <div class="row">
                    <div class="col-sm-4 text-center" style="margin-bottom: 30px;">
                        <div class="thumbnail" style="position: relative;">
                            <span class="label label-danger" style="position: absolute; top: 10px; left: 10px; padding: 5px;">-24%</span>
                            <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=300" alt="Cọ bộ">
                            <div class="caption">
                                <h5><strong>Bộ Cọ Vẽ Art Secret 10 Cây</strong></h5>
                                <p style="color: #d9534f; font-weight: bold;">185.000đ</p>
                                <button class="btn btn-danger btn-sm" onclick="addToCart()">Chọn Mua</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-sm-4 text-center" style="margin-bottom: 30px;">
                        <div class="thumbnail" style="position: relative;">
                            <span class="label label-danger" style="position: absolute; top: 10px; left: 10px; padding: 5px;">-10%</span>
                            <img src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?q=80&w=300" alt="Cọ đắp">
                            <div class="caption">
                                <h5><strong>Cọ Flat Đầu Bằng Bay Vẽ</strong></h5>
                                <p style="color: #d9534f; font-weight: bold;">45.000đ</p>
                                <button class="btn btn-danger btn-sm" onclick="addToCart()">Chọn Mua</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-sm-4 text-center" style="margin-bottom: 30px;">
                        <div class="thumbnail" style="position: relative;">
                            <span class="label label-danger" style="position: absolute; top: 10px; left: 10px; padding: 5px;">-15%</span>
                            <img src="https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?q=80&w=300" alt="Cọ tỉa">
                            <div class="caption">
                                <h5><strong>Bộ Cọ Tỉa Đi Nét Màu Nước</strong></h5>
                                <p style="color: #d9534f; font-weight: bold;">95.000đ</p>
                                <button class="btn btn-danger btn-sm" onclick="addToCart()">Chọn Mua</button>
                            </div>
                        </div>
                    </div>
                </div> </div> </div> </div>

    <footer class="text-center" style="background-color: #2d2d30; color: #f5f5f5; padding: 20px; margin-top: 60px;">
        <p>Bản quyền thuộc về © 2026 <strong>ArtDoor Hoacu</strong></p>
    </footer>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
